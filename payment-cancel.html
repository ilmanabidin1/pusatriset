<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran Dibatalkan - JurnalHub PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --primary-color: #0787dc;
      --brand-blue: #082240;
      --text-main: #051329;
      --text-muted: #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
    }
    .card {
      background: #ffffff;
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(8, 34, 64, 0.08);
      border: 1px solid rgba(8, 34, 64, 0.04);
      padding: 3rem 2rem;
      text-align: center;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .icon-wrapper {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      color: #ef4444;
      font-size: 2.2rem;
    }
    h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.65rem;
      margin: 0 0 0.75rem 0;
    }
    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 2rem 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      background: var(--brand-blue);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(8, 34, 64, 0.25);
    }
    .btn:hover {
      background: #0d2f57;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <i class="fa-solid fa-circle-xmark"></i>
    </div>
    <h2>Pembayaran Dibatalkan</h2>
    <p>Anda telah membatalkan proses pembayaran transaksi JurnalHub PRO. Saldo Anda tidak terpotong. Silakan kembali ke dasbor jika ingin mencoba memilih paket ulang.</p>
    <a href="/" class="btn">
      <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
    </a>
  </div>
</body>
</html>
