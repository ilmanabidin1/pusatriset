<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Kata Sandi - JurnalHub</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Shared Style -->
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Desain khusus halaman reset agar senada dengan auth.html */
    body {
      background: radial-gradient(circle at 10% 20%, rgb(9, 28, 54) 0%, rgb(6, 17, 34) 90%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      padding: 1.5rem;
    }
    .reset-card-container {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    .branding-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .branding-logo img {
      max-height: 48px;
      width: auto;
    }
    .reset-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: #ffffff;
      margin: 0 0 0.5rem 0;
    }
    .reset-desc {
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 1rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      pointer-events: none;
    }
    .input-wrapper input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }
    .input-wrapper input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: #ffffff;
    }
    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #0787dc, #0c203a);
      border: none;
      border-radius: 10px;
      padding: 0.95rem;
      color: #ffffff;
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      margin-top: 1.5rem;
      box-shadow: 0 4px 15px rgba(7, 135, 220, 0.25);
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(7, 135, 220, 0.35);
    }
    .auth-btn:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    .auth-error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      padding: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      font-weight: 600;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .auth-success {
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
      padding: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      font-weight: 600;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .back-link {
      margin-top: 1.5rem;
      display: inline-block;
      font-size: 0.88rem;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #60a5fa;
    }
  </style>
</head>
<body>

  <div class="reset-card-container">
    <a href="/" class="branding-logo">
      <img src="assets/jurnalhub-logo-light.png" alt="JurnalHub Logo">
    </a>

    <h2 class="reset-title">Reset Kata Sandi</h2>
    <p class="reset-desc">Silakan masukkan kata sandi baru Anda di bawah ini untuk memperbarui keamanan akun.</p>

    <div id="resetError" class="auth-error"></div>
    <div id="resetSuccess" class="auth-success"></div>

    <form id="resetForm">
      <div class="form-group">
        <label for="newPassword">Kata Sandi Baru</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="newPassword" placeholder="Minimal 6 karakter" required minlength="6">
          <button type="button" class="password-toggle" data-input="newPassword">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Konfirmasi Kata Sandi Baru</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="confirmPassword" placeholder="Ulangi kata sandi baru" required minlength="6">
          <button type="button" class="password-toggle" data-input="confirmPassword">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="submitBtn">
        <i class="fa-solid fa-key"></i> Perbarui Kata Sandi
      </button>
    </form>

    <a href="/auth.html" class="back-link">Kembali ke Halaman Masuk</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Show/Hide Password Toggle
      const toggles = document.querySelectorAll('.password-toggle');
      toggles.forEach(toggle => {
        toggle.addEventListener('click', () => {
          const inputId = toggle.getAttribute('data-input');
          const input = document.getElementById(inputId);
          const icon = toggle.querySelector('i');
          
          if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
          } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye';
          }
        });
      });

      // Ambil token dari query parameters URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      const errorEl = document.getElementById('resetError');
      const successEl = document.getElementById('resetSuccess');
      const form = document.getElementById('resetForm');
      const submitBtn = document.getElementById('submitBtn');

      if (!token) {
        errorEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Token tidak valid atau tidak ditemukan. Mohon ajukan kembali tautan pemulihan.`;
        errorEl.style.display = 'flex';
        submitBtn.disabled = true;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        errorEl.innerHTML = '';
        errorEl.style.display = 'none';
        successEl.innerHTML = '';
        successEl.style.display = 'none';

        if (newPassword !== confirmPassword) {
          errorEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Konfirmasi kata sandi tidak cocok.`;
          errorEl.style.display = 'flex';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...`;

        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: newPassword })
          });

          const data = await response.json();

          if (response.ok) {
            successEl.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${data.message}`;
            successEl.style.display = 'flex';
            form.reset();
            setTimeout(() => {
              window.location.href = '/auth.html';
            }, 3000);
          } else {
            errorEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${data.message}`;
            errorEl.style.display = 'flex';
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="fa-solid fa-key"></i> Perbarui Kata Sandi`;
          }
        } catch (err) {
          errorEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Gagal terhubung ke server.`;
          errorEl.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<i class="fa-solid fa-key"></i> Perbarui Kata Sandi`;
        }
      });
    });
  </script>

</body>
</html>
